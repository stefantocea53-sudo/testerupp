<!DOCTYPE html>

    <style>
        :root {
            --tt-cyan: #00f2ea;
            --tt-pink: #ff0050;
            --gold: #d4af37;
            --bg: #000000;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px 0;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(0, 242, 234, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(255, 0, 80, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            max-width: 450px;
            width: 90%;
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .tt-badge {
            display: inline-flex;
            align-items: center;
            background: white;
            color: black;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 25px;
            box-shadow: -3px 0 var(--tt-cyan), 3px 0 var(--tt-pink);
        }

        .tt-badge i { margin-right: 8px; font-size: 1rem; }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 15px;
            background: linear-gradient(45deg, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .viral-tag {
            color: var(--tt-cyan);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
        }

        .main-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            color: black;
            padding: 20px 30px;
            border-radius: 20px;
            text-decoration: none;
            margin-top: 30px;
            font-weight: 800;
            font-size: 1.4rem;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        .main-button:hover {
            transform: scale(1.05);
            background: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .sub-text {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .social-proof {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .proof-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            height: 150px;
        }

        .proof-item:hover {
            transform: translateY(-10px) rotate(3deg);
            border-color: var(--gold);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .proof-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: grayscale(20%);
        }

        /* SVG Simulates Content */
        .proof-1::before {
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300"><rect width="200" height="300" fill="%231a1a1a"/><text x="50%" y="40%" font-family="sans-serif" font-size="24" fill="%232ecc71" text-anchor="middle" font-weight="bold">%2B$120.00</text><text x="50%" y="60%" font-family="sans-serif" font-size="12" fill="%23fff" text-anchor="middle">Received from Testerup</text></svg>');
        }

        .proof-2::before {
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300"><rect width="200" height="300" fill="%23333"/><circle cx="100" cy="100" r="60" fill="%23d4af37"/><text x="50%" y="110%" font-family="sans-serif" font-size="14" fill="%23000" text-anchor="middle" font-weight="bold">LEVEL 50 REACHED</text></svg>');
        }

        .proof-3::before {
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300"><rect width="200" height="300" fill="%23222"/><text x="50%" y="160" font-family="sans-serif" font-size="16" fill="%23fff" text-anchor="middle" font-weight="bold">@GamingViral</text><text x="50%" y="190" font-family="sans-serif" font-size="12" fill="%23ccc" text-anchor="middle">"It actually works!"</text></svg>');
        }

        .proof-caption {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 10px 0;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .live-count {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #888;
        }

        .live-count b { color: var(--tt-cyan); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

            DOWNLOAD & TEST

        <div class="social-proof">

        <p style="margin-top: 30px; font-size: 0.6rem; opacity: 0.4;">

    </div>

</body>
</html>
