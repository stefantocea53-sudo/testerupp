<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Access Request | Processing...</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --tt-cyan: #00f2ea;
            --tt-pink: #ff0050;
            --gold: #d4af37;
            --bg: #000000;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.1) 0%, transparent 80%);
            z-index: -1;
        }

        .glass-card {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .verified-badge {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
        }

        .verified-badge i { margin-right: 8px; }

        h2 { font-weight: 900; font-size: 2.2rem; line-height: 1.1; margin: 0 0 15px; }
        h2 span { background: linear-gradient(45deg, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .important-note {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid #ffa500;
            color: #ffa500;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 30px;
            display: flex;
            align-items: flex-start;
            text-align: left;
        }

        .important-note i { margin-right: 12px; margin-top: 2px; font-size: 1rem; }

        .yes-btn {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 900;
            display: block;
            font-size: 1.4rem;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .yes-btn:hover {
            transform: scale(1.03);
            background: var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
        }

        .yes-btn span { font-weight: 300; font-size: 0.9rem; }

        .cancel-btn {
            display: block;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="glass-card">
    <div class="verified-badge">
        <i class="fas fa-user-check"></i> REQUEST VERIFIED
    </div>

    <h2>READY TO <span>PROFIT?</span></h2>
    
    <div class="important-note">
        <i class="fas fa-exclamation-triangle"></i>
        <div>
            New users: Complete 2 quick compatibility tests on the next page to unlock high-ticket scrolling rewards.
        </div>
    </div>

    <a href="offer.html" class="yes-btn">
        YES, START NOW
    </a>

    <a href="#" class="cancel-btn">No, not yet</a>
</div>

</body>
</html>
